enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
# See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
command-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

# i3 wraps focus by default
command-j =         'focus --boundaries-action wrap-around-the-workspace left'
command-k =         'focus --boundaries-action wrap-around-the-workspace down'
command-l =         'focus --boundaries-action wrap-around-the-workspace up'
command-semicolon = 'focus --boundaries-action wrap-around-the-workspace right'

command-shift-j = 'move left'
command-shift-k = 'move down'
command-shift-l = 'move up'
command-shift-semicolon = 'move right'

# Consider using 'join-with' command as a 'split' replacement if you want to enable
# normalizations
command-h = 'split horizontal'
command-v = 'split vertical'

command-f = 'fullscreen'

command-s = 'layout v_accordion' # 'layout stacking' in i3
command-w = 'layout h_accordion' # 'layout tabbed' in i3
command-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

command-shift-space = 'layout floating tiling' # 'floating toggle' in i3

# Not supported, because this command is redundant in AeroSpace mental model.
# See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
#command-space = 'focus toggle_tiling_floating'

# `focus parent`/`focus child` are not yet supported, and it's not clear whether they
# should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
# command-a = 'focus parent'

command-1 = 'workspace 1'
command-2 = 'workspace 2'
command-3 = 'workspace 3'
command-4 = 'workspace 4'
command-5 = 'workspace 5'
command-6 = 'workspace 6'
command-7 = 'workspace 7'
command-8 = 'workspace 8'
command-9 = 'workspace 9'
command-0 = 'workspace 10'

command-shift-1 = 'move-node-to-workspace 1'
command-shift-2 = 'move-node-to-workspace 2'
command-shift-3 = 'move-node-to-workspace 3'
command-shift-4 = 'move-node-to-workspace 4'
command-shift-5 = 'move-node-to-workspace 5'
command-shift-6 = 'move-node-to-workspace 6'
command-shift-7 = 'move-node-to-workspace 7'
command-shift-8 = 'move-node-to-workspace 8'
command-shift-9 = 'move-node-to-workspace 9'
command-shift-0 = 'move-node-to-workspace 10'

command-shift-c = 'reload-config'

command-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'
