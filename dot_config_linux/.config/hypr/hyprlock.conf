background {
    monitor =
    path = ~/wallpaper/lake.png
    blur_passes = 2
    blur_size = 5
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(7c94bf)
    inner_color = rgb(1a1a2e)
    font_color = rgb(ffffff)
    placeholder_text = <i>Password</i>
    fail_text = <i>Incorrect</i>
    fade_on_empty = true
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    font_size = 72
    font_family = sans-serif
    color = rgba(ffffffff)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    font_size = 20
    font_family = sans-serif
    color = rgba(ffffffcc)
    position = 0, 40
    halign = center
    valign = center
}
